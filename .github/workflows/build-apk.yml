name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project (if uploaded as a zip)
        run: |
          if [ -f SkipStreetApp.zip ]; then
            unzip -o SkipStreetApp.zip -d .
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Build debug APK
        working-directory: SkipStreetApp
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkipStreet-debug-apk
          path: SkipStreetApp/app/build/outputs/apk/debug/*.apk
