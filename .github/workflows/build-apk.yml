name: Build APK and Signed AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project (if uploaded as a zip)
        run: |
          if [ -f SkipStreetApp.zip ]; then
            unzip -o SkipStreetApp.zip -d .
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Build debug APK
        working-directory: SkipStreetApp
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkipStreet-debug-apk
          path: SkipStreetApp/app/build/outputs/apk/debug/*.apk

      # ------------------------------------------------------------
      # Restore the SAME keystore every run, from a repo secret, so
      # every build (this one and every future update) is signed
      # with the identical key - required by Play Store.
      #
      # FIRST RUN ONLY: if RELEASE_KEYSTORE_BASE64 secret doesn't
      # exist yet, this generates a brand-new keystore instead. It's
      # uploaded as an artifact below - download it, then add it as
      # that secret (see instructions) before your NEXT run so every
      # future build reuses this exact same key.
      # ------------------------------------------------------------
      - name: Restore or generate keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > release-key.jks
            echo "Restored existing keystore from secret."
          else
            keytool -genkeypair -v \
              -keystore release-key.jks \
              -alias release-key \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "TempPass123!" \
              -keypass "TempPass123!" \
              -dname "CN=App, OU=Dev, O=AGGames, L=City, S=State, C=US"
            echo "Generated a NEW keystore - save it as a secret before your next build!"
          fi

      - name: Build signed release AAB
        working-directory: SkipStreetApp
        env:
          RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/release-key.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' && secrets.RELEASE_KEYSTORE_PASSWORD || 'TempPass123!' }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' && secrets.RELEASE_KEY_ALIAS || 'release-key' }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' && secrets.RELEASE_KEY_PASSWORD || 'TempPass123!' }}
        run: gradle bundleRelease --no-daemon

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: SkipStreet-release-aab
          path: SkipStreetApp/app/build/outputs/bundle/release/*.aab

      - name: Upload keystore (SAVE THIS if it's your first signed build!)
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore-KEEP-SAFE
          path: release-key.jks
